<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" role="img" aria-label="Embedding lookup: each token ID indexes into a learned matrix and pulls out a vector">
  <title>Step 2: Embedding lookup</title>
  <desc>Four token IDs on the left (3919, 82, 733, 5043) point arrows at a tall rectangle in the middle representing the embedding matrix. The matrix has many faint horizontal rows; four of them are highlighted in purple at the row positions corresponding to the IDs. Each highlighted row sends an arrow to the right, ending at a purple vector strip composed of small coloured cells representing the components of the learned vector for that token.</desc>

  <defs>
    <marker id="arr-gray-2" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0,0 6,3 0,6" fill="#888"/>
    </marker>
  </defs>

  <!-- title -->
  <text x="360" y="28" text-anchor="middle" fill="#EB6E1F" font-size="15" font-family="ui-monospace, monospace" font-weight="600">Embedding lookup</text>
  <text x="360" y="48" text-anchor="middle" fill="#888" font-size="11" font-family="sans-serif" font-style="italic">token IDs index into a learned matrix; each row is a vector</text>

  <!-- Left: ID boxes -->
  <rect x="50"  y="90"  width="80" height="30" rx="6" ry="6" fill="rgba(0,45,98,0.12)" stroke="#002D62" stroke-width="1.2"/>
  <text x="90"  y="110" text-anchor="middle" fill="#002D62" font-size="13" font-family="ui-monospace, monospace">3919</text>
  <rect x="50"  y="140" width="80" height="30" rx="6" ry="6" fill="rgba(0,45,98,0.12)" stroke="#002D62" stroke-width="1.2"/>
  <text x="90"  y="160" text-anchor="middle" fill="#002D62" font-size="13" font-family="ui-monospace, monospace">82</text>
  <rect x="50"  y="190" width="80" height="30" rx="6" ry="6" fill="rgba(0,45,98,0.12)" stroke="#002D62" stroke-width="1.2"/>
  <text x="90"  y="210" text-anchor="middle" fill="#002D62" font-size="13" font-family="ui-monospace, monospace">733</text>
  <rect x="50"  y="240" width="80" height="30" rx="6" ry="6" fill="rgba(0,45,98,0.12)" stroke="#002D62" stroke-width="1.2"/>
  <text x="90"  y="260" text-anchor="middle" fill="#002D62" font-size="13" font-family="ui-monospace, monospace">5043</text>

  <!-- Middle: embedding matrix (a tall rectangle with horizontal row lines) -->
  <rect x="250" y="75" width="220" height="220" rx="4" ry="4" fill="none" stroke="#888" stroke-width="1.2"/>
  <text x="360" y="68" text-anchor="middle" fill="#888" font-size="11" font-family="ui-monospace, monospace">embedding matrix (vocab × dim)</text>

  <!-- many faint row lines -->
  <g stroke="#444" stroke-width="0.4" opacity="0.5">
    <line x1="252" y1="90"  x2="468" y2="90"/>
    <line x1="252" y1="100" x2="468" y2="100"/>
    <line x1="252" y1="110" x2="468" y2="110"/>
    <line x1="252" y1="120" x2="468" y2="120"/>
    <line x1="252" y1="130" x2="468" y2="130"/>
    <line x1="252" y1="140" x2="468" y2="140"/>
    <line x1="252" y1="150" x2="468" y2="150"/>
    <line x1="252" y1="160" x2="468" y2="160"/>
    <line x1="252" y1="170" x2="468" y2="170"/>
    <line x1="252" y1="180" x2="468" y2="180"/>
    <line x1="252" y1="190" x2="468" y2="190"/>
    <line x1="252" y1="200" x2="468" y2="200"/>
    <line x1="252" y1="210" x2="468" y2="210"/>
    <line x1="252" y1="220" x2="468" y2="220"/>
    <line x1="252" y1="230" x2="468" y2="230"/>
    <line x1="252" y1="240" x2="468" y2="240"/>
    <line x1="252" y1="250" x2="468" y2="250"/>
    <line x1="252" y1="260" x2="468" y2="260"/>
    <line x1="252" y1="270" x2="468" y2="270"/>
    <line x1="252" y1="280" x2="468" y2="280"/>
  </g>

  <!-- four highlighted rows (purple), aligned with ID arrows -->
  <rect x="252" y="100" width="216" height="9" fill="rgba(0,45,98,0.28)" stroke="#002D62" stroke-width="0.8"/>
  <rect x="252" y="150" width="216" height="9" fill="rgba(0,45,98,0.28)" stroke="#002D62" stroke-width="0.8"/>
  <rect x="252" y="200" width="216" height="9" fill="rgba(0,45,98,0.28)" stroke="#002D62" stroke-width="0.8"/>
  <rect x="252" y="250" width="216" height="9" fill="rgba(0,45,98,0.28)" stroke="#002D62" stroke-width="0.8"/>

  <!-- arrows from IDs to matrix rows -->
  <line x1="135" y1="105" x2="248" y2="105" stroke="#888" stroke-width="1.2" marker-end="url(#arr-gray-2)"/>
  <line x1="135" y1="155" x2="248" y2="155" stroke="#888" stroke-width="1.2" marker-end="url(#arr-gray-2)"/>
  <line x1="135" y1="205" x2="248" y2="205" stroke="#888" stroke-width="1.2" marker-end="url(#arr-gray-2)"/>
  <line x1="135" y1="255" x2="248" y2="255" stroke="#888" stroke-width="1.2" marker-end="url(#arr-gray-2)"/>

  <!-- arrows from matrix rows to vectors -->
  <line x1="472" y1="105" x2="540" y2="105" stroke="#888" stroke-width="1.2" marker-end="url(#arr-gray-2)"/>
  <line x1="472" y1="155" x2="540" y2="155" stroke="#888" stroke-width="1.2" marker-end="url(#arr-gray-2)"/>
  <line x1="472" y1="205" x2="540" y2="205" stroke="#888" stroke-width="1.2" marker-end="url(#arr-gray-2)"/>
  <line x1="472" y1="255" x2="540" y2="255" stroke="#888" stroke-width="1.2" marker-end="url(#arr-gray-2)"/>

  <!-- Right: vector strips -->
  <g font-family="ui-monospace, monospace" font-size="9" fill="#fff">
    <!-- row 1 -->
    <rect x="544" y="95"  width="16" height="20" fill="rgba(0,45,98,0.85)"/>
    <rect x="562" y="95"  width="16" height="20" fill="rgba(0,45,98,0.35)"/>
    <rect x="580" y="95"  width="16" height="20" fill="rgba(0,45,98,0.55)"/>
    <rect x="598" y="95"  width="16" height="20" fill="rgba(0,45,98,0.20)"/>
    <rect x="616" y="95"  width="16" height="20" fill="rgba(0,45,98,0.70)"/>
    <rect x="634" y="95"  width="16" height="20" fill="rgba(0,45,98,0.45)"/>
    <text x="660" y="110" fill="#888">...</text>
    <!-- row 2 -->
    <rect x="544" y="145" width="16" height="20" fill="rgba(0,45,98,0.25)"/>
    <rect x="562" y="145" width="16" height="20" fill="rgba(0,45,98,0.70)"/>
    <rect x="580" y="145" width="16" height="20" fill="rgba(0,45,98,0.40)"/>
    <rect x="598" y="145" width="16" height="20" fill="rgba(0,45,98,0.85)"/>
    <rect x="616" y="145" width="16" height="20" fill="rgba(0,45,98,0.30)"/>
    <rect x="634" y="145" width="16" height="20" fill="rgba(0,45,98,0.55)"/>
    <text x="660" y="160" fill="#888">...</text>
    <!-- row 3 -->
    <rect x="544" y="195" width="16" height="20" fill="rgba(0,45,98,0.50)"/>
    <rect x="562" y="195" width="16" height="20" fill="rgba(0,45,98,0.25)"/>
    <rect x="580" y="195" width="16" height="20" fill="rgba(0,45,98,0.80)"/>
    <rect x="598" y="195" width="16" height="20" fill="rgba(0,45,98,0.45)"/>
    <rect x="616" y="195" width="16" height="20" fill="rgba(0,45,98,0.65)"/>
    <rect x="634" y="195" width="16" height="20" fill="rgba(0,45,98,0.30)"/>
    <text x="660" y="210" fill="#888">...</text>
    <!-- row 4 -->
    <rect x="544" y="245" width="16" height="20" fill="rgba(0,45,98,0.35)"/>
    <rect x="562" y="245" width="16" height="20" fill="rgba(0,45,98,0.60)"/>
    <rect x="580" y="245" width="16" height="20" fill="rgba(0,45,98,0.20)"/>
    <rect x="598" y="245" width="16" height="20" fill="rgba(0,45,98,0.75)"/>
    <rect x="616" y="245" width="16" height="20" fill="rgba(0,45,98,0.50)"/>
    <rect x="634" y="245" width="16" height="20" fill="rgba(0,45,98,0.40)"/>
    <text x="660" y="260" fill="#888">...</text>
  </g>

  <text x="595" y="83" text-anchor="middle" fill="#002D62" font-size="11" font-family="ui-monospace, monospace">vectors (dim ≈ 2k–16k)</text>

  <!-- caption -->
  <text x="360" y="320" text-anchor="middle" fill="#888" font-size="11" font-family="sans-serif" font-style="italic">Each row of the matrix is a learned vector. The lookup turns a list of IDs into a list of vectors.</text>
</svg>
