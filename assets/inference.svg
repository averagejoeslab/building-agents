<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" role="img" aria-label="Inference: the autoregressive loop with temperature, top-k, and top-p sampling">
  <title>Inference</title>
  <desc>The figure has two halves. The top half shows the autoregressive loop as three successive iterations. In iter 1 the input is the token sequence "The cat sat on the", which is run through model+sample to produce the next token "mat" (highlighted in orange). In iter 2 the new token has been appended to the input and the model now runs over "The cat sat on the mat", producing the next token ".". In iter 3 the input is "The cat sat on the mat .", and the model emits the end-of-sequence token, which terminates the loop. The bottom half compares three sampling knobs side by side. The temperature panel shows two stacked mini bar charts: at T=0.3 the distribution is peaky (one bar dominates), at T=1.5 it is flat (bars roughly equal). The top-k panel shows eight bars sorted by probability; the top three are highlighted in orange (kept), the bottom five are dimmed (dropped). The top-p panel shows the same eight bars with a cumulative-sum bracket marking p=0.9; bars inside the nucleus are highlighted in orange, bars outside are dimmed.</desc>

  <defs>
    <marker id="arr-gray-i" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0,0 6,3 0,6" fill="#888"/>
    </marker>
    <marker id="arr-orange-i" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0,0 6,3 0,6" fill="#EB6E1F"/>
    </marker>
  </defs>

  <!-- title -->
  <text x="360" y="28" text-anchor="middle" fill="#EB6E1F" font-size="15" font-family="ui-monospace, monospace" font-weight="600">Inference</text>
  <text x="360" y="48" text-anchor="middle" fill="#888" font-size="11" font-family="sans-serif" font-style="italic">sample one token, append it back to the input, repeat — until &lt;/s&gt; or max length</text>

  <!-- ============================================================== -->
  <!-- TOP HALF: autoregressive loop, three concrete iterations         -->
  <!-- ============================================================== -->

  <!-- iter 1 -->
  <text x="30" y="92" fill="#888" font-size="10" font-family="ui-monospace, monospace">iter 1</text>
  <g font-family="ui-monospace, monospace" font-size="11">
    <rect x="74" y="78" width="38" height="22" rx="3" ry="3" fill="rgba(0,45,98,0.18)" stroke="#002D62" stroke-width="1"/>
    <text x="93"  y="93" text-anchor="middle" fill="#002D62">The</text>
    <rect x="114" y="78" width="38" height="22" rx="3" ry="3" fill="rgba(0,45,98,0.18)" stroke="#002D62" stroke-width="1"/>
    <text x="133" y="93" text-anchor="middle" fill="#002D62">cat</text>
    <rect x="154" y="78" width="38" height="22" rx="3" ry="3" fill="rgba(0,45,98,0.18)" stroke="#002D62" stroke-width="1"/>
    <text x="173" y="93" text-anchor="middle" fill="#002D62">sat</text>
    <rect x="194" y="78" width="38" height="22" rx="3" ry="3" fill="rgba(0,45,98,0.18)" stroke="#002D62" stroke-width="1"/>
    <text x="213" y="93" text-anchor="middle" fill="#002D62">on</text>
    <rect x="234" y="78" width="38" height="22" rx="3" ry="3" fill="rgba(0,45,98,0.18)" stroke="#002D62" stroke-width="1"/>
    <text x="253" y="93" text-anchor="middle" fill="#002D62">the</text>
  </g>
  <text x="295" y="93" fill="#888" font-size="11" font-family="ui-monospace, monospace">→ model + sample →</text>
  <rect x="442" y="78" width="46" height="22" rx="3" ry="3" fill="rgba(235,110,31,0.30)" stroke="#EB6E1F" stroke-width="1.4"/>
  <text x="465" y="93" text-anchor="middle" fill="#EB6E1F" font-size="11" font-family="ui-monospace, monospace" font-weight="600">mat</text>

  <!-- iter 2 -->
  <text x="30" y="132" fill="#888" font-size="10" font-family="ui-monospace, monospace">iter 2</text>
  <g font-family="ui-monospace, monospace" font-size="11">
    <rect x="74"  y="118" width="38" height="22" rx="3" ry="3" fill="rgba(0,45,98,0.18)" stroke="#002D62" stroke-width="1"/>
    <text x="93"  y="133" text-anchor="middle" fill="#002D62">The</text>
    <rect x="114" y="118" width="38" height="22" rx="3" ry="3" fill="rgba(0,45,98,0.18)" stroke="#002D62" stroke-width="1"/>
    <text x="133" y="133" text-anchor="middle" fill="#002D62">cat</text>
    <rect x="154" y="118" width="38" height="22" rx="3" ry="3" fill="rgba(0,45,98,0.18)" stroke="#002D62" stroke-width="1"/>
    <text x="173" y="133" text-anchor="middle" fill="#002D62">sat</text>
    <rect x="194" y="118" width="38" height="22" rx="3" ry="3" fill="rgba(0,45,98,0.18)" stroke="#002D62" stroke-width="1"/>
    <text x="213" y="133" text-anchor="middle" fill="#002D62">on</text>
    <rect x="234" y="118" width="38" height="22" rx="3" ry="3" fill="rgba(0,45,98,0.18)" stroke="#002D62" stroke-width="1"/>
    <text x="253" y="133" text-anchor="middle" fill="#002D62">the</text>
    <!-- newly appended "mat" -->
    <rect x="274" y="118" width="38" height="22" rx="3" ry="3" fill="rgba(235,110,31,0.18)" stroke="#EB6E1F" stroke-width="1.2"/>
    <text x="293" y="133" text-anchor="middle" fill="#EB6E1F">mat</text>
  </g>
  <text x="335" y="133" fill="#888" font-size="11" font-family="ui-monospace, monospace">→ model + sample →</text>
  <rect x="482" y="118" width="46" height="22" rx="3" ry="3" fill="rgba(235,110,31,0.30)" stroke="#EB6E1F" stroke-width="1.4"/>
  <text x="505" y="133" text-anchor="middle" fill="#EB6E1F" font-size="11" font-family="ui-monospace, monospace" font-weight="600">.</text>

  <!-- iter 3 -->
  <text x="30" y="172" fill="#888" font-size="10" font-family="ui-monospace, monospace">iter 3</text>
  <g font-family="ui-monospace, monospace" font-size="11">
    <rect x="74"  y="158" width="38" height="22" rx="3" ry="3" fill="rgba(0,45,98,0.18)" stroke="#002D62" stroke-width="1"/>
    <text x="93"  y="173" text-anchor="middle" fill="#002D62">The</text>
    <rect x="114" y="158" width="38" height="22" rx="3" ry="3" fill="rgba(0,45,98,0.18)" stroke="#002D62" stroke-width="1"/>
    <text x="133" y="173" text-anchor="middle" fill="#002D62">cat</text>
    <rect x="154" y="158" width="38" height="22" rx="3" ry="3" fill="rgba(0,45,98,0.18)" stroke="#002D62" stroke-width="1"/>
    <text x="173" y="173" text-anchor="middle" fill="#002D62">sat</text>
    <rect x="194" y="158" width="38" height="22" rx="3" ry="3" fill="rgba(0,45,98,0.18)" stroke="#002D62" stroke-width="1"/>
    <text x="213" y="173" text-anchor="middle" fill="#002D62">on</text>
    <rect x="234" y="158" width="38" height="22" rx="3" ry="3" fill="rgba(0,45,98,0.18)" stroke="#002D62" stroke-width="1"/>
    <text x="253" y="173" text-anchor="middle" fill="#002D62">the</text>
    <rect x="274" y="158" width="38" height="22" rx="3" ry="3" fill="rgba(0,45,98,0.18)" stroke="#002D62" stroke-width="1"/>
    <text x="293" y="173" text-anchor="middle" fill="#002D62">mat</text>
    <!-- newly appended "." -->
    <rect x="314" y="158" width="38" height="22" rx="3" ry="3" fill="rgba(235,110,31,0.18)" stroke="#EB6E1F" stroke-width="1.2"/>
    <text x="333" y="173" text-anchor="middle" fill="#EB6E1F">.</text>
  </g>
  <text x="375" y="173" fill="#888" font-size="11" font-family="ui-monospace, monospace">→ model + sample →</text>
  <rect x="522" y="158" width="60" height="22" rx="3" ry="3" fill="rgba(235,110,31,0.45)" stroke="#EB6E1F" stroke-width="1.8"/>
  <text x="552" y="173" text-anchor="middle" fill="#fff" font-size="11" font-family="ui-monospace, monospace" font-weight="600">&lt;/s&gt;</text>
  <text x="590" y="173" fill="#EB6E1F" font-size="11" font-family="ui-monospace, monospace" font-weight="600">← stop</text>

  <!-- loop annotation -->
  <text x="360" y="207" text-anchor="middle" fill="#888" font-size="11" font-family="sans-serif" font-style="italic">each iteration's sample becomes the next iteration's last input token — that's the loop</text>

  <!-- ============================================================== -->
  <!-- BOTTOM HALF: three sampling knobs                                -->
  <!-- ============================================================== -->

  <text x="360" y="240" text-anchor="middle" fill="#EB6E1F" font-size="13" font-family="ui-monospace, monospace" font-weight="600">What "sample" actually does</text>

  <!-- divider lines -->
  <line x1="245" y1="258" x2="245" y2="430" stroke="#888" stroke-width="0.5" stroke-dasharray="3,4" opacity="0.4"/>
  <line x1="480" y1="258" x2="480" y2="430" stroke="#888" stroke-width="0.5" stroke-dasharray="3,4" opacity="0.4"/>

  <!-- ========== Temperature panel (x: 20-240) ========== -->
  <text x="130" y="270" text-anchor="middle" fill="#002D62" font-size="12" font-family="ui-monospace, monospace" font-weight="600">temperature</text>
  <text x="130" y="284" text-anchor="middle" fill="#888" font-size="10" font-family="sans-serif" font-style="italic">low → peaky, high → flat</text>

  <!-- T=0.3 mini bar chart (peaky) -->
  <text x="40" y="306" fill="#EB6E1F" font-size="10" font-family="ui-monospace, monospace">T=0.3</text>
  <g>
    <rect x="76"  y="338" width="12" height="2"  fill="rgba(235,110,31,0.6)" stroke="#EB6E1F" stroke-width="0.6"/>
    <rect x="90"  y="334" width="12" height="6"  fill="rgba(235,110,31,0.6)" stroke="#EB6E1F" stroke-width="0.6"/>
    <rect x="104" y="312" width="12" height="28" fill="rgba(235,110,31,0.6)" stroke="#EB6E1F" stroke-width="0.6"/>
    <rect x="118" y="298" width="12" height="42" fill="rgba(235,110,31,0.85)" stroke="#EB6E1F" stroke-width="0.8"/>
    <rect x="132" y="324" width="12" height="16" fill="rgba(235,110,31,0.6)" stroke="#EB6E1F" stroke-width="0.6"/>
    <rect x="146" y="336" width="12" height="4"  fill="rgba(235,110,31,0.6)" stroke="#EB6E1F" stroke-width="0.6"/>
    <rect x="160" y="338" width="12" height="2"  fill="rgba(235,110,31,0.6)" stroke="#EB6E1F" stroke-width="0.6"/>
    <rect x="174" y="339" width="12" height="1"  fill="rgba(235,110,31,0.6)" stroke="#EB6E1F" stroke-width="0.6"/>
  </g>
  <line x1="74" y1="340" x2="190" y2="340" stroke="#888" stroke-width="0.6"/>
  <text x="195" y="324" fill="#888" font-size="9" font-family="sans-serif" font-style="italic">more</text>
  <text x="195" y="335" fill="#888" font-size="9" font-family="sans-serif" font-style="italic">deterministic</text>

  <!-- T=1.5 mini bar chart (flatter) -->
  <text x="40" y="365" fill="#888" font-size="10" font-family="ui-monospace, monospace">T=1.5</text>
  <g>
    <rect x="76"  y="394" width="12" height="14" fill="rgba(0,45,98,0.45)" stroke="#002D62" stroke-width="0.6"/>
    <rect x="90"  y="389" width="12" height="19" fill="rgba(0,45,98,0.45)" stroke="#002D62" stroke-width="0.6"/>
    <rect x="104" y="382" width="12" height="26" fill="rgba(0,45,98,0.45)" stroke="#002D62" stroke-width="0.6"/>
    <rect x="118" y="378" width="12" height="30" fill="rgba(0,45,98,0.6)"  stroke="#002D62" stroke-width="0.8"/>
    <rect x="132" y="385" width="12" height="23" fill="rgba(0,45,98,0.45)" stroke="#002D62" stroke-width="0.6"/>
    <rect x="146" y="391" width="12" height="17" fill="rgba(0,45,98,0.45)" stroke="#002D62" stroke-width="0.6"/>
    <rect x="160" y="395" width="12" height="13" fill="rgba(0,45,98,0.45)" stroke="#002D62" stroke-width="0.6"/>
    <rect x="174" y="398" width="12" height="10" fill="rgba(0,45,98,0.45)" stroke="#002D62" stroke-width="0.6"/>
  </g>
  <line x1="74" y1="408" x2="190" y2="408" stroke="#888" stroke-width="0.6"/>
  <text x="195" y="392" fill="#888" font-size="9" font-family="sans-serif" font-style="italic">more</text>
  <text x="195" y="403" fill="#888" font-size="9" font-family="sans-serif" font-style="italic">random</text>

  <!-- ========== top-k panel (x: 260-460) ========== -->
  <text x="362" y="270" text-anchor="middle" fill="#002D62" font-size="12" font-family="ui-monospace, monospace" font-weight="600">top-k</text>
  <text x="362" y="284" text-anchor="middle" fill="#888" font-size="10" font-family="sans-serif" font-style="italic">keep only the k highest, drop the rest</text>

  <!-- 8 bars sorted high → low; top 3 highlighted -->
  <g>
    <rect x="280" y="306" width="18" height="84" fill="rgba(235,110,31,0.7)"  stroke="#EB6E1F" stroke-width="0.8"/>
    <rect x="300" y="328" width="18" height="62" fill="rgba(235,110,31,0.7)"  stroke="#EB6E1F" stroke-width="0.8"/>
    <rect x="320" y="346" width="18" height="44" fill="rgba(235,110,31,0.7)"  stroke="#EB6E1F" stroke-width="0.8"/>
    <!-- below cut-off, dimmed -->
    <rect x="340" y="364" width="18" height="26" fill="rgba(0,45,98,0.10)" stroke="#002D62" stroke-width="0.6" stroke-dasharray="2,2"/>
    <rect x="360" y="372" width="18" height="18" fill="rgba(0,45,98,0.10)" stroke="#002D62" stroke-width="0.6" stroke-dasharray="2,2"/>
    <rect x="380" y="378" width="18" height="12" fill="rgba(0,45,98,0.10)" stroke="#002D62" stroke-width="0.6" stroke-dasharray="2,2"/>
    <rect x="400" y="383" width="18" height="7"  fill="rgba(0,45,98,0.10)" stroke="#002D62" stroke-width="0.6" stroke-dasharray="2,2"/>
    <rect x="420" y="386" width="18" height="4"  fill="rgba(0,45,98,0.10)" stroke="#002D62" stroke-width="0.6" stroke-dasharray="2,2"/>
  </g>
  <line x1="278" y1="390" x2="440" y2="390" stroke="#888" stroke-width="0.6"/>

  <!-- cut-off marker -->
  <line x1="338" y1="298" x2="338" y2="402" stroke="#EB6E1F" stroke-width="1.2" stroke-dasharray="3,3"/>
  <text x="335" y="296" text-anchor="end" fill="#EB6E1F" font-size="10" font-family="ui-monospace, monospace" font-weight="600">k=3 cut-off</text>

  <!-- bar labels -->
  <text x="289" y="402" text-anchor="middle" fill="#EB6E1F" font-size="9" font-family="ui-monospace, monospace">1st</text>
  <text x="309" y="402" text-anchor="middle" fill="#EB6E1F" font-size="9" font-family="ui-monospace, monospace">2nd</text>
  <text x="329" y="402" text-anchor="middle" fill="#EB6E1F" font-size="9" font-family="ui-monospace, monospace">3rd</text>
  <text x="389" y="402" text-anchor="middle" fill="#888" font-size="9" font-family="ui-monospace, monospace" opacity="0.6">dropped</text>

  <text x="362" y="422" text-anchor="middle" fill="#888" font-size="10" font-family="sans-serif" font-style="italic">re-normalize the survivors → sample</text>

  <!-- ========== top-p / nucleus panel (x: 500-700) ========== -->
  <text x="600" y="270" text-anchor="middle" fill="#002D62" font-size="12" font-family="ui-monospace, monospace" font-weight="600">top-p / nucleus</text>
  <text x="600" y="284" text-anchor="middle" fill="#888" font-size="10" font-family="sans-serif" font-style="italic">smallest set summing to p</text>

  <!-- 8 bars sorted; bars summing to 0.9 highlighted -->
  <g>
    <!-- bar heights match probabilities; first 4 sum to ~0.9 -->
    <rect x="510" y="306" width="18" height="84" fill="rgba(235,110,31,0.7)"  stroke="#EB6E1F" stroke-width="0.8"/>
    <rect x="530" y="328" width="18" height="62" fill="rgba(235,110,31,0.7)"  stroke="#EB6E1F" stroke-width="0.8"/>
    <rect x="550" y="346" width="18" height="44" fill="rgba(235,110,31,0.7)"  stroke="#EB6E1F" stroke-width="0.8"/>
    <rect x="570" y="364" width="18" height="26" fill="rgba(235,110,31,0.7)"  stroke="#EB6E1F" stroke-width="0.8"/>
    <!-- outside nucleus -->
    <rect x="590" y="372" width="18" height="18" fill="rgba(0,45,98,0.10)" stroke="#002D62" stroke-width="0.6" stroke-dasharray="2,2"/>
    <rect x="610" y="378" width="18" height="12" fill="rgba(0,45,98,0.10)" stroke="#002D62" stroke-width="0.6" stroke-dasharray="2,2"/>
    <rect x="630" y="383" width="18" height="7"  fill="rgba(0,45,98,0.10)" stroke="#002D62" stroke-width="0.6" stroke-dasharray="2,2"/>
    <rect x="650" y="386" width="18" height="4"  fill="rgba(0,45,98,0.10)" stroke="#002D62" stroke-width="0.6" stroke-dasharray="2,2"/>
  </g>
  <line x1="508" y1="390" x2="670" y2="390" stroke="#888" stroke-width="0.6"/>

  <!-- cumulative sum bracket above the nucleus -->
  <path d="M 510 300 L 510 296 L 588 296 L 588 300" fill="none" stroke="#EB6E1F" stroke-width="1.2"/>
  <text x="549" y="294" text-anchor="middle" fill="#EB6E1F" font-size="10" font-family="ui-monospace, monospace" font-weight="600">Σ ≈ p (0.9)</text>

  <text x="600" y="422" text-anchor="middle" fill="#888" font-size="10" font-family="sans-serif" font-style="italic">k adapts to how confident the model is</text>

  <!-- caption -->
  <text x="360" y="455" text-anchor="middle" fill="#888" font-size="11" font-family="sans-serif" font-style="italic">temperature reshapes the distribution; top-k and top-p truncate it. The three knobs compose freely.</text>
  <text x="360" y="472" text-anchor="middle" fill="#888" font-size="11" font-family="sans-serif" font-style="italic">Once a token is picked it feeds back into the input and the whole forward pass runs again.</text>
</svg>
